<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATG — Homepage Threat Map</title>
<style>
  :root{--navy:#000730;--deep:#0f25a4;--bright:#266df7;--light:#73a3ff;--spark:#eaf2ff;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000730;overflow:hidden;
    font-family:"Segoe UI",Inter,system-ui,Arial,sans-serif;color:#eaf2ff}
  #stage{position:fixed;inset:0;overflow:hidden;background:
    radial-gradient(120% 90% at 50% 42%, #001657 0%, #000b3d 48%, #000730 100%);}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:pan-y}

  /* Top bar */
  #top{position:absolute;left:22px;right:22px;top:16px;display:flex;justify-content:space-between;
    align-items:flex-start;gap:16px;z-index:5;pointer-events:none}
  #title h1{margin:0;font-size:clamp(16px,2.2vw,26px);font-weight:800;letter-spacing:.02em;color:#eaf2ff;
    text-shadow:0 0 20px rgba(38,109,247,.85)}
  #title h1 .accent{color:#73a3ff}
  #title .sub{margin:5px 0 0;font-size:clamp(11px,1.3vw,14px);color:#aec6ff}
  #stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  #stats .s{border:1px solid rgba(38,109,247,.5);border-radius:999px;padding:5px 13px;background:rgba(38,109,247,.12);text-align:center}
  #stats .s b{display:block;color:#9dc0ff;font-size:15px}
  #stats .s span{font-size:9px;letter-spacing:.13em;color:#cfe0ff}

  /* Legend */
  #legend{position:absolute;left:20px;bottom:18px;display:flex;flex-direction:column;gap:7px;
    font-size:12px;color:#bcd2ff;z-index:5;pointer-events:none}
  #legend .row{display:flex;align-items:center;gap:9px}
  #legend .dash{width:22px;height:0;border-top:3px solid;border-radius:3px;box-shadow:0 0 8px currentColor}
  #legend .lossdot{width:12px;height:12px;border-radius:50%;background:#dbe8ff;box-shadow:0 0 10px #73a3ff,0 0 3px #fff;border:1px solid #266df7}
  #legend .estdot{width:12px;height:12px;border-radius:50%;background:rgba(150,180,255,.45);border:1px dashed #73a3ff;box-shadow:0 0 7px rgba(115,163,255,.5)}
  #tip .tc.est{color:#9dc0ff;font-weight:800}
  #heatbar{width:140px;height:9px;border-radius:5px;margin:4px 0 2px;
    background:linear-gradient(90deg, #16308f, #266df7 55%, #9dc0ff);box-shadow:0 0 10px rgba(38,109,247,.5)}
  #heatkey .hlab{font-size:9px;letter-spacing:.1em;color:#9dc0ff;margin-top:2px}
  #heatkey .lab{display:flex;justify-content:space-between;width:140px;font-size:9px;color:#7f9ddb;letter-spacing:.06em}
  #legend .cap{color:#7f9ddb;font-size:11px;margin-top:3px}

  /* Feed */
  #feed{position:absolute;right:14px;top:50%;transform:translateY(-50%);height:64%;width:250px;overflow:hidden;z-index:5;
    background:linear-gradient(180deg, rgba(0,9,55,.42), rgba(0,7,48,.14));border-left:1px solid rgba(38,109,247,.3);
    border-radius:10px;padding:10px 8px 0 12px;backdrop-filter:blur(2px);
    -webkit-mask-image:linear-gradient(180deg,#000 82%,transparent);mask-image:linear-gradient(180deg,#000 82%,transparent)}
  #feedHead{font-size:10px;letter-spacing:.22em;color:#9dc0ff;margin-bottom:8px}
  #feedInner{display:flex;flex-direction:column;gap:8px;animation:scrollUp 70s linear infinite}
  .fitem{display:flex;gap:10px;align-items:center;border-left:2px solid #266df7;
    background:linear-gradient(90deg, rgba(15,37,164,.3), rgba(15,37,164,.04));padding:7px 9px;border-radius:0 7px 7px 0}
  .fitem .fc{font-weight:800;color:#cfe0ff;font-size:13px;min-width:54px;text-shadow:0 0 10px rgba(115,163,255,.6)}
  .fitem .fe{font-size:11px;color:#eaf2ff;line-height:1.2}
  .fitem .fs{font-size:9px;color:#8fb0ee;margin-top:2px}
  @keyframes scrollUp{from{transform:translateY(0)}to{transform:translateY(-50%)}}
  #feed:hover #feedInner{animation-play-state:paused}

  /* Tooltip */
  #tip{position:absolute;z-index:9;min-width:180px;max-width:260px;padding:11px 13px;pointer-events:none;
    background:rgba(4,12,52,.96);border:1px solid rgba(115,163,255,.55);border-radius:9px;
    box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 20px rgba(38,109,247,.35);opacity:0;transform:translateY(4px);
    transition:opacity .12s ease;font-size:12px}
  #tip.on{opacity:1;transform:translateY(0)}
  #tip .te{font-weight:700;color:#eaf2ff;font-size:13px;margin-bottom:3px}
  #tip .tl{color:#9dc0ff;font-size:11px;margin-bottom:7px}
  #tip .tc{font-size:16px;font-weight:800;color:#bfe;color:#9dc0ff;text-shadow:0 0 12px rgba(115,163,255,.6)}
  #tip .tc small{display:block;font-weight:400;font-size:10px;color:#7f9ddb;letter-spacing:.04em;margin-top:2px}
  #tip .attempt{color:#8fb0ee;font-size:11px}
  #live{position:absolute;left:20px;top:16px;display:none;align-items:center;gap:8px;z-index:6;
    font-size:12px;color:#cfe0ff;background:rgba(0,9,55,.5);border:1px solid rgba(38,109,247,.5);
    border-radius:999px;padding:6px 14px;backdrop-filter:blur(2px)}
  #live .dot{width:9px;height:9px;border-radius:50%;background:#73a3ff;box-shadow:0 0 9px #73a3ff;animation:lp 1.4s infinite}
  #live b{color:#eaf2ff;font-size:14px}
  #live .lt{margin-left:6px;font-size:9px;letter-spacing:.14em;color:#8fb0ee}
  @keyframes lp{0%,100%{opacity:1}50%{opacity:.35}}

  #src{position:absolute;right:16px;bottom:12px;font-size:10px;color:#5f7db8;letter-spacing:.04em;z-index:5}
  @media(max-width:760px){ #feed{display:none} #stats .s span{font-size:8px} #legend{font-size:11px} }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="live"></div>
  <div id="feed"><div id="feedHead">DOCUMENTED RECOVERY COSTS</div><div id="feedInner"></div></div>
  <div id="legend">
    <div class="row"><span class="dash" style="color:#73a3ff"></span> Malware</div>
    <div class="row"><span class="dash" style="color:#4d8bff"></span> Phishing</div>
    <div class="row"><span class="dash" style="color:#266df7"></span> Exploit</div>
    <div class="row"><span class="lossdot"></span> Reported recovery cost</div>
    <div class="row"><span class="estdot"></span> Estimated cost (modeled)</div>
    <div id="heatkey"><div class="hlab">THREAT RISK</div><div id="heatbar"></div><div class="lab"><span>LOWER</span><span>CRITICAL</span></div></div>
  </div>
  <div id="tip"></div>
</div>

const IC3_LOSS={"California":2539041635,"Texas":1351598183,"Florida":1071909632,"New York":903975003,

"Washington":368203209,"Massachusetts":338872378,"North Carolina":324287947,"Virginia":317406595,

const LMIN=Math.log10(5e7),LMAX=Math.log10(2.6e9),LR=LMAX-LMIN;
function stateWeight(name){const loss=IC3_LOSS[name]||8e7;const t=Math.max(0,Math.min(1,(Math.log10(loss)-LMIN)/LR));return 0.42+0.58*t;}
function mixHeat(w){const lo=[12,30,96],hi=[130,172,255];return lo.map((v,i)=>Math.round(v+(hi[i]-v)*w));}
function choColor(w){return 'rgba('+mixHeat(w).join(',')+',0.92)';}
let stateW=[];

function buildPaths(){statePaths=DATA.statePaths.map(d=>new Path2D(d));nationPath=new Path2D(DATA.nationPath);}
function buildHeat(){const hc=document.createElement('canvas');hc.width=DATA.W;hc.height=DATA.H;
  const h=hc.getContext('2d');h.globalCompositeOperation='lighter';
  function blob(x,y,r,c,a){const g=h.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba('+c+','+a+')');g.addColorStop(1,'rgba('+c+',0)');
    h.fillStyle=g;h.beginPath();h.arc(x,y,r,0,7);h.fill();}
  // 1) exposure density: 7,000+ real US population centers, each weighted by size × FBI IC3 state factor.
  //    Empty terrain (tundra, desert, plains) has no points -> stays dark. Populated areas glow.
  (DATA.heatPoints||[]).forEach(p=>{const w=p[2],r=9+30*w,a=0.05+0.20*w,
    c=w>0.62?'150,185,255':w>0.4?'95,150,255':'55,115,235';blob(p[0],p[1],r,c,a);});
  // 2) documented incidents (real events) burn hottest on top
  DATA.incidents.forEach(p=>{const w=p.w,r=40+120*w,a=0.16+0.5*w,
    c=w>0.6?'160,190,255':w>0.32?'100,155,255':'65,125,245';blob(p.x,p.y,r,c,a);});
  heatCanvas=hc;}
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;

  const availW=W-feedW;
  scale=Math.min(availW/DATA.W,H/DATA.H);
  ox=(availW-DATA.W*scale)/2;oy=(H-DATA.H*scale)/2;}
window.addEventListener('resize',resize);
function applyDesign(){ctx.setTransform(dpr*scale,0,0,dpr*scale,dpr*ox,dpr*oy);}

function edgePoint(){const s=(Math.random()*4)|0;
  if(s===0)return[rand(0,DATA.W),-20];if(s===1)return[DATA.W+20,rand(0,DATA.H)];
  if(s===2)return[rand(0,DATA.W),DATA.H+20];return[-20,rand(0,DATA.H)];}
function targetPoint(){if(Math.random()<0.55){const p=pick(DATA.incidents);return[p.x,p.y];}return pick(DATA.cities);}
function spawn(){const t=targetPoint();const src=Math.random()<0.5?edgePoint():pick(DATA.cities);
  const [sx,sy]=src,[tx,ty]=t,mx=(sx+tx)/2,my=(sy+ty)/2,dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1;
  const off=len*0.18*(Math.random()<.5?1:-1),cx=mx+(-dy/len)*off,cy=my+(dx/len)*off;
  signals.push({sx,sy,tx,ty,cx,cy,t:0,sp:rand(0.55,0.95),col:pick([TYPE_COLORS.malware,TYPE_COLORS.phishing,TYPE_COLORS.exploit])});}
function qpt(s,t){const u=1-t;return[u*u*s.sx+2*u*t*s.cx+t*t*s.tx,u*u*s.sy+2*u*t*s.cy+t*t*s.ty];}
// ---- live-feed motion: attacks stream in from the edges toward real US targets ----
function edgeFromOrigin(sLng,sLat){
  const side=(sLng>=-30&&sLng<=75)?'right':'left';   // Atlantic vs Pacific approach
  const x=side==='left'?-25:DATA.W+25;
  let y=DATA.H*(0.72-(sLat-10)/70)+rand(-40,40);
  return [x,Math.max(20,Math.min(DATA.H-20,y))];
}
function makeSignal(sx,sy,tx,ty,col){
  const mx=(sx+tx)/2,my=(sy+ty)/2,dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1;
  const off=len*0.18*(Math.random()<.5?1:-1),cx=mx+(-dy/len)*off,cy=my+(dx/len)*off;
  signals.push({sx,sy,tx,ty,cx,cy,t:0,sp:rand(0.5,0.95),col});
}
function spawnFromEvent(ev){
  if(!projection) return;
  const t=projection([+ev.tLng,+ev.tLat]); if(!t) return;
  const [sx,sy]=edgeFromOrigin(+ev.sLng,+ev.sLat);
  makeSignal(sx,sy,t[0],t[1],TYPE_COLORS[ev.type]||pick([TYPE_COLORS.malware,TYPE_COLORS.phishing,TYPE_COLORS.exploit]));
}

function drawBase(now){
  // dark land base
  ctx.save();ctx.fillStyle='rgba(6,14,50,.92)';statePaths.forEach(p=>ctx.fill(p));ctx.restore();
  // exposure heat bloom, clipped to land
  ctx.save();ctx.clip(nationPath);ctx.globalAlpha=0.92+0.06*Math.sin(now/1300);ctx.drawImage(heatCanvas,0,0,DATA.W,DATA.H);
  ctx.globalAlpha=0.16+0.06*Math.sin(now/850);ctx.drawImage(heatCanvas,0,0,DATA.W,DATA.H);ctx.restore();
  // borders + nation outline
  ctx.save();ctx.lineWidth=0.6;ctx.strokeStyle='rgba(120,160,255,.20)';statePaths.forEach(p=>ctx.stroke(p));ctx.restore();
  ctx.save();ctx.lineWidth=1.3;ctx.strokeStyle='rgba(150,185,255,.5)';ctx.shadowColor='rgba(120,165,255,.6)';ctx.shadowBlur=12;ctx.stroke(nationPath);ctx.restore();}

const tip=document.getElementById('tip');
function hitTest(clientX,clientY){const r=cv.getBoundingClientRect();const rx=clientX-r.left,ry=clientY-r.top;
  let best=-1,bd=1e9;DATA.incidents.forEach((p,i)=>{const sx=ox+p.x*scale,sy=oy+p.y*scale;const d=Math.hypot(rx-sx,ry-sy);
    const rad=(p.cost?3.2+7*p.w:4)*scale+11;if(d<rad&&d<bd){bd=d;best=i;}});return best;}
function showTip(i,clientX,clientY){const p=DATA.incidents[i];const r=cv.getBoundingClientRect();
  let cost;
  if(p.costType==='reported') cost='<div class="tc">'+p.costDisplay+'<small>reported · '+p.sector+' · '+p.year+'</small></div>';
  else if(p.costType==='estimated') cost='<div class="tc est">'+p.costDisplay+'<small>estimated (IBM/Sophos model) · '+p.sector+' · '+p.year+'</small></div>';
  else cost='<div class="attempt">Ransom demand / no loss figure · '+p.sector+' · '+p.year+'</div>';
  tip.innerHTML='<div class="te">'+p.entity+'</div><div class="tl">'+p.city+', '+p.state+'</div>'+cost;
  tip.classList.add('on');const tw=tip.offsetWidth,th=tip.offsetHeight;
  let x=clientX-r.left+14,y=clientY-r.top+14;if(x+tw>W)x=clientX-r.left-tw-14;if(y+th>H)y=clientY-r.top-th-14;
  tip.style.left=Math.max(6,x)+'px';tip.style.top=Math.max(6,y)+'px';}
function hideTip(){tip.classList.remove('on');hoverId=-1;pinned=false;}
cv.addEventListener('pointermove',e=>{if(e.pointerType!=='mouse'||pinned)return;const i=hitTest(e.clientX,e.clientY);
  hoverId=i;if(i>=0){cv.style.cursor='pointer';showTip(i,e.clientX,e.clientY);}else{cv.style.cursor='default';hideTip();}});
cv.addEventListener('pointerdown',e=>{const i=hitTest(e.clientX,e.clientY);
  if(i>=0){hoverId=i;pinned=true;showTip(i,e.clientX,e.clientY);}else hideTip();});
cv.addEventListener('pointerleave',()=>{if(!pinned)hideTip();});

// ---- live feed: project lat/lng, recompute, hot-swap data ----
let projection=null;
function setupProjection(){ if(window.d3&&d3.geoAlbersUsa&&DATA.projParams){
  projection=d3.geoAlbersUsa().scale(DATA.projParams.scale).translate(DATA.projParams.translate);} }
const L6=6,L9=Math.log10(3e9);
function weight(c){if(!c)return 0.12;const l=Math.log10(c);return Math.max(0.05,Math.min(1,(l-L6)/(L9-L6)));}
const EST={"Healthcare & Public Health":{small:1300000,mid:5000000,large:9800000},"Banking & Finance":{small:900000,mid:3200000,large:6100000},"State & Local Government":{small:400000,mid:1500000,large:3200000},"Education":{small:500000,mid:1800000,large:3600000},"Water & Wastewater":{small:300000,mid:1200000,large:4000000},"Utilities & Electric":{small:500000,mid:2400000,large:5300000},"Energy":{small:900000,mid:3000000,large:5300000},"Critical Manufacturing":{small:800000,mid:2800000,large:5600000},"Transportation":{small:700000,mid:2500000,large:4200000},"Aviation":{small:800000,mid:3000000,large:5000000},"Railroad":{small:800000,mid:3000000,large:5000000},"Agriculture & Food Production":{small:700000,mid:2500000,large:4500000},"Defense":{small:900000,mid:3500000,large:6000000},"Emergency Services":{small:400000,mid:1200000,large:3000000},"Hospitality & Gaming":{small:700000,mid:3000000,large:6000000}};
const DEFEST={small:500000,mid:2000000,large:4000000};
function shortUsd(n){return n>=1e9?'$'+(n/1e9).toFixed(1)+'B':n>=1e6?'$'+(n/1e6).toFixed(n>=1e7?0:1)+'M':'$'+Math.round(n/1e3)+'K';}
function normalize(arr){const out=[];arr.forEach(d=>{
  let x=d.x,y=d.y;
  if((x==null||y==null)&&projection&&d.lng!=null&&d.lat!=null){const p=projection([+d.lng,+d.lat]);if(p){x=+p[0].toFixed(1);y=+p[1].toFixed(1);}}
  if(x==null||y==null)return;
  const isDemand=/demand/i.test(d.cost_display||'');const size=d.size||'mid';
  let costType,cost,costDisplay;
  if(d.cost_usd!=null&&!isDemand){costType='reported';cost=d.cost_usd;costDisplay=d.cost_display;}
  else if(isDemand){costType='none';cost=null;costDisplay='';}
  else {costType='estimated';cost=((EST[d.sector]||DEFEST)[size]||2000000);costDisplay='Est. '+shortUsd(cost);}
  out.push({entity:d.entity,city:d.city,state:d.state,sector:d.sector,year:d.year,size,
    costType,cost,costDisplay,x,y,w:+weight(cost).toFixed(3)});});
  return out;}
function recomputeTotals(inc){const r=inc.filter(i=>i.costType==='reported'),e=inc.filter(i=>i.costType==='estimated');
  const rs=r.reduce((s,i)=>s+i.cost,0),es=e.reduce((s,i)=>s+i.cost,0);const f=n=>n>=1e9?'$'+(n/1e9).toFixed(1)+'B':'$'+Math.round(n/1e6)+'M';
  return{count:inc.length,reported:r.length,estimated:e.length,reportedDisplay:f(rs),estimatedDisplay:f(es),combinedDisplay:f(rs+es),sectors:[...new Set(inc.map(i=>i.sector))].length};}
function applyData(inc){if(!inc||!inc.length)return;DATA.incidents=inc;DATA.totals=recomputeTotals(inc);
  buildHeat();fmtStats();buildFeed();computeLabels();}
async function loadFeed(){if(!FEED_URL)return;
  try{const res=await fetch(FEED_URL,{cache:'no-store'});if(!res.ok)throw 0;const raw=await res.json();
    const inc=normalize(Array.isArray(raw)?raw:(raw.incidents||[]));
    if(inc.length){applyData(inc);}
  }catch(e){/* keep built-in launch data */}}

function updateLive(){const el=document.getElementById('live');if(!el)return;
  el.style.display='inline-flex';
  el.innerHTML='<span class="dot"></span><b>'+Number(liveCount).toLocaleString()+'</b>&nbsp;active malicious sources'+
    '<span class="lt">LIVE'+(liveUpdated?' · '+liveUpdated.slice(11,16)+' UTC':'')+'</span>';}
async function loadAttacks(){try{const r=await fetch(ATTACKS_URL,{cache:'no-store'});if(!r.ok)throw 0;const d=await r.json();
  if(d&&Array.isArray(d.events)&&d.events.length){liveEvents=d.events;liveCount=d.activeMaliciousSources||0;liveUpdated=d.updated||'';liveOn=true;updateLive();}}catch(e){/* unreachable -> keep internal motion */}}

buildPaths();setupProjection();stateW=(DATA.stateNames||[]).map(stateWeight);buildHeat();fmtStats();buildFeed();computeLabels();resize();requestAnimationFrame(frame);loadFeed();loadAttacks();setInterval(loadAttacks,60000);
</script>
